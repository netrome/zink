<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>zink</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 28rem; margin: 1.5rem auto; padding: 0 1rem; }
    input, textarea, button { width: 100%; font-size: 1rem; padding: .6rem; margin: .2rem 0 .8rem; box-sizing: border-box; }
    button { background: #0e6b64; color: #fff; border: none; border-radius: .4rem; }
    #mykey { font-family: monospace; font-size: .75rem; word-break: break-all; }
    #status { margin: .5rem 0; } .ok { color: green; } .err { color: crimson; }
    #inbox div { padding: .4rem 0; border-bottom: 1px solid #ddd; word-break: break-word; }
  </style>
</head>
<body>
  <h2>zink</h2>
  <p>your key: <span id="mykey">…</span></p>
  <label>relay <input id="relay" placeholder="endpoint-id@ip:port"></label>
  <label>to (pubkey) <input id="to" placeholder="contact's key (hex)"></label>
  <label>message <textarea id="text" rows="2"></textarea></label>
  <button id="send">send</button>
  <button id="refresh">check inbox</button>
  <div id="status"></div>
  <div id="inbox"></div>
  <script>
    const { invoke } = window.__TAURI__.core;
    const status = document.getElementById("status");
    const flash = (message, cls) => { status.textContent = message; status.className = cls; };

    invoke("my_key")
      .then((key) => document.getElementById("mykey").textContent = key)
      .catch((e) => flash("❌ " + e, "err"));

    const relay = () => document.getElementById("relay").value.trim();

    document.getElementById("send").onclick = async () => {
      flash("sending…", "");
      try {
        const receipt = await invoke("send_text", {
          relay: relay(),
          to: document.getElementById("to").value.trim(),
          text: document.getElementById("text").value,
        });
        document.getElementById("text").value = "";
        flash("✅ " + receipt, "ok");
      } catch (e) { flash("❌ " + e, "err"); }
    };

    document.getElementById("refresh").onclick = async () => {
      flash("fetching…", "");
      try {
        const lines = await invoke("recv_texts", { relay: relay() });
        flash(lines.length ? `✅ ${lines.length} new` : "no new messages", "ok");
        const inbox = document.getElementById("inbox");
        for (const line of lines) {
          const entry = document.createElement("div");
          entry.textContent = line;
          inbox.prepend(entry);
        }
      } catch (e) { flash("❌ " + e, "err"); }
    };
  </script>
</body>
</html>
