<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>zink</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif; max-width: 28rem; margin: 0 auto;
      padding: .5rem 1rem; display: flex; flex-direction: column;
      min-height: 100vh;
    }
    header { display: flex; gap: .4rem; padding: .3rem 0 .5rem; }
    header button { flex: 1; background: #ddd; color: #333; }
    header button.active { background: #0e6b64; color: #fff; }
    main { flex: 1; display: flex; flex-direction: column; }
    h3 { margin: 1rem 0 .4rem; border-bottom: 1px solid #ddd; }
    input, textarea, select, button {
      width: 100%; font-size: 1rem; padding: .55rem; margin: .2rem 0 .4rem;
    }
    button { background: #0e6b64; color: #fff; border: none; border-radius: .4rem; }
    button.secondary { background: #555; }
    #status { min-height: 1.3em; font-size: .9rem; }
    .ok { color: green; } .err { color: crimson; }
    #qr { text-align: center; margin: .5rem 0; }
    #qr svg { max-width: 240px; }
    #record-text { font-family: monospace; font-size: .6rem; word-break: break-all; color: #777; }
    .row { padding: .55rem .2rem; border-bottom: 1px solid #eee; cursor: pointer; }
    .row b { margin-right: .5rem; }
    .dim { color: #888; font-size: .8rem; }
    .messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: .4rem; }
    .msg { max-width: 85%; align-self: flex-start; background: #eee;
           border-radius: .6rem; padding: .4rem .6rem; word-break: break-word; }
    .msg.mine { align-self: flex-end; background: #d3ece9; }
    .compose { margin-top: auto; padding-top: .5rem; }
  </style>
</head>
<body>
  <script type="module">
    import init from "./pkg/zink_ui.js";
    init();
  </script>
</body>
</html>
