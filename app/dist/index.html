<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>zink</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 28rem; margin: 1rem auto; padding: 0 1rem; }
    h3 { margin: 1.2rem 0 .4rem; border-bottom: 1px solid #ddd; }
    input, textarea, select, button { width: 100%; font-size: 1rem; padding: .55rem; margin: .2rem 0 .6rem; box-sizing: border-box; }
    button { background: #0e6b64; color: #fff; border: none; border-radius: .4rem; }
    button.secondary { background: #555; }
    #qr { text-align: center; margin: .5rem 0; }
    #qr svg { max-width: 240px; }
    #record-text { font-family: monospace; font-size: .6rem; word-break: break-all; color: #777; }
    #status { margin: .5rem 0; min-height: 1.2em; } .ok { color: green; } .err { color: crimson; }
    #inbox div { padding: .4rem 0; border-bottom: 1px solid #eee; word-break: break-word; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div id="status"></div>

  <h3>me</h3>
  <label>name <input id="name" placeholder="how contacts see you"></label>
  <label>relay <input id="relay" placeholder="endpoint-id@ip:port"></label>
  <button id="save">save profile & show QR</button>
  <div id="qr"></div>
  <div id="record-text"></div>

  <h3>add contact</h3>
  <button id="scan">scan QR</button>
  <textarea id="paste" rows="2" placeholder="…or paste a ZINK: payload"></textarea>
  <button id="add" class="secondary">add from pasted text</button>

  <h3>chat</h3>
  <label>to <select id="to"></select></label>
  <label>message <textarea id="text" rows="2"></textarea></label>
  <button id="send">send</button>
  <button id="refresh" class="secondary">check inbox</button>
  <div id="inbox"></div>

  <script>
    const { invoke } = window.__TAURI__.core;
    const el = (id) => document.getElementById(id);
    const flash = (message, cls) => { el("status").textContent = message; el("status").className = cls || ""; };

    function showRecord(record) {
      if (!record) return;
      el("qr").innerHTML = record.svg;
      el("record-text").textContent = record.text;
    }

    function showContacts(names) {
      el("to").innerHTML = names.length
        ? names.map((name) => `<option>${name}</option>`).join("")
        : "<option disabled selected>no contacts yet</option>";
    }

    async function hydrate() {
      try {
        const state = await invoke("app_state");
        if (state.name) el("name").value = state.name;
        if (state.relay) el("relay").value = state.relay;
        showRecord(state.record);
        showContacts(state.contacts);
      } catch (e) { flash("❌ " + e, "err"); }
    }
    hydrate();

    el("save").onclick = async () => {
      flash("saving…");
      try {
        const record = await invoke("set_profile", {
          name: el("name").value.trim(),
          relay: el("relay").value.trim(),
        });
        showRecord(record);
        flash("✅ profile saved — let a friend scan your QR", "ok");
      } catch (e) { flash("❌ " + e, "err"); }
    };

    async function addContact(payload) {
      const petname = await invoke("add_contact", { payload, petname: null });
      await hydrate();
      flash(`✅ added ${petname}`, "ok");
    }

    el("scan").onclick = async () => {
      flash("opening camera…");
      try {
        await invoke("plugin:barcode-scanner|request_permissions");
        const scanned = await invoke("plugin:barcode-scanner|scan", {
          windowed: false,
          formats: ["QR_CODE"],
        });
        await addContact(scanned.content);
      } catch (e) { flash("❌ " + e, "err"); }
    };

    el("add").onclick = async () => {
      try {
        await addContact(el("paste").value);
        el("paste").value = "";
      } catch (e) { flash("❌ " + e, "err"); }
    };

    el("send").onclick = async () => {
      flash("sending…");
      try {
        const receipt = await invoke("send_text", {
          to: el("to").value,
          text: el("text").value,
        });
        el("text").value = "";
        flash("✅ " + receipt, "ok");
      } catch (e) { flash("❌ " + e, "err"); }
    };

    el("refresh").onclick = async () => {
      flash("fetching…");
      try {
        const lines = await invoke("recv_texts");
        flash(lines.length ? `✅ ${lines.length} new` : "no new messages", "ok");
        for (const line of lines) {
          const entry = document.createElement("div");
          entry.textContent = line;
          el("inbox").prepend(entry);
        }
      } catch (e) { flash("❌ " + e, "err"); }
    };
  </script>
</body>
</html>
